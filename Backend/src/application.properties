spring.application.name=OT-crm

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── HikariCP — Pool de conexiones para concurrencia ─────────────────────────
# 20 conexiones soportan ~20 agentes simultáneos sin esperar.
# Si hay más de 20 requests bloqueados en DB a la vez, las nuevas esperan hasta connection-timeout.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Detecta conexiones que no se devuelven al pool en 60s — indica posible leak
spring.datasource.hikari.leak-detection-threshold=60000

server.port=${PORT:8080}

bot.secret.key=${BOT_SECRET_KEY}
node.bot.url=${NODE_BOT_URL}
telegram.bridge.url=${TELEGRAM_BRIDGE_URL:http://127.0.0.1:5000}

resend.api.key=${RESEND_API_KEY}
app.email.enabled=${APP_EMAIL_ENABLED:true}

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


app.default-admin.password=${APP_DEFAULT_ADMIN_PASSWORD}
app.default-admin.email=${APP_DEFAULT_ADMIN_EMAIL:admin@example.com}
app.storage.location=${APP_STORAGE_LOCATION:/tmp/uploads}

logging.level.com.crm.crm_ot=INFO
# El formato de logging se define en logback-spring.xml (dev: legible, prod: JSON)

spring.messaging.simp.destinations-prefix=/app
spring.messaging.simp.broker-messaging-prefixes=/topic
server.forward-headers-strategy=native

mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}
app.base.url=${APP_BASE_URL}
app.email.from=${APP_EMAIL_FROM:no-reply@example.com}
app.cors.origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=${PAYPAL_MODE:sandbox}
paypal.webhook.id=${PAYPAL_WEBHOOK_ID:}

mercadopago.webhook.secret=${MERCADOPAGO_WEBHOOK_SECRET:}

# ── Precios de planes (ARS) ──────────────────────────────────────────────────
plan.price.pro=${PLAN_PRICE_PRO:15000.0}
plan.price.business=${PLAN_PRICE_BUSINESS:30000.0}
plan.price.enterprise=${PLAN_PRICE_ENTERPRISE:60000.0}

jwt.secret=${JWT_SECRET}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:10}

# ── WebSocket ───────────────────────────────────────────────────────────────
app.websocket.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Open-in-view desactivado — las conexiones se liberan al salir del @Service/Repository ──
# Las relaciones que siempre se necesitan (Usuario.agencia, Usuario.plan) son EAGER.
# Cualquier otro lazy-load debe resolverse con @EntityGraph o fetch joins en el repository.
spring.jpa.open-in-view=false

# ── Actuator — health checks para Railway/Docker ────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true